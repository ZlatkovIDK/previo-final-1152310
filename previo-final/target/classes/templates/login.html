<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UFPS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #7e1a1a 0%, #932828 50%, #a10d23 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            color: #7e1a1a;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .logo p {
            color: #666;
            font-size: .85rem;
            margin-top: .3rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: .4rem;
        }
        input {
            width: 100%;
            padding: .75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color .2s;
            outline: none;
        }
        input:focus { border-color: #7e1a1a; }
        .btn {
            width: 100%;
            padding: .85rem;
            background: #7e1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            margin-top: .5rem;
        }
        .btn:hover { background: #932828; }
        .alert {
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }
        .alert-danger { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: .8rem;
            color: #666;
        }
        .hint strong { color: #333; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🎓 UFPS</h1>
        <p>Programación Web — Examen Final</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Sesión cerrada correctamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username"
                   placeholder="Ingresa tu usuario" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit" class="btn">Iniciar sesión</button>
    </form>

    <div class="hint">
        <strong>Usuarios de prueba:</strong><br>
        admin / admin123 &nbsp;·&nbsp; user1 / user123 &nbsp;·&nbsp; user2 / user123
    </div>
</div>
</body>
</html>
