<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        .code { font-size: 5rem; font-weight: 700; color: #d32f2f; }
        h2 { color: #333; margin: .5rem 0 1rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        a {
            background: #1a237e;
            color: white;
            padding: .6rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
        }
        a:hover { background: #283593; }
    </style>
</head>
<body>
<div class="box">
    <div class="code">403</div>
    <h2>Acceso Denegado</h2>
    <p>No tienes permisos para acceder a este recurso.</p>
    <a href="/home">← Volver al inicio</a>
</div>
</body>
</html>
